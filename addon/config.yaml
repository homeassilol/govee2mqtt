name: Govee to MQTT Bridge (patched)
version: "2026.03.14-0070e48-patched"
slug: govee2mqtt
description: Control Govee Devices
url: https://github.com/homeassilol/govee2mqtt
arch:
  - amd64
  - aarch64
init: false
startup: services
services:
  - mqtt:need

apparmor: true

webui: http://[HOST]:[PORT:8056]/assets/index.html
#ingress: true
#ingress_port: 8056

# Host network access is required for LAN discovery
host_network: true

map:
  - type: addon_config
    read_only: false
    path: /app/config

options:
  temperature_scale: "C"

schema:
  temperature_scale: "str?"
  govee_email: "str?"
  govee_password: "password?"
  govee_api_key: "password?"
